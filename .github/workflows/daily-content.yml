name: Publicação Diária de Conteúdo

on:
  schedule:
    - cron: '0 10 * * *'   # todo dia às 07h (horário de Brasília = 10h UTC)
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

permissions:
  contents: write

jobs:
  gerar-conteudo:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install google-genai feedparser requests

      - name: Gerar e publicar conteúdo
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SHOPEE_SECRET_KEY: ${{ secrets.SHOPEE_SECRET_KEY }}
        run: python scripts/generate_content.py

      - name: Commit e push
        run: |
          git config user.name "Concurseira PCD Bot"
          git config user.email "bot@concurseirapcd.com.br"
          git add noticias.html direitos-pcd.html achadinhos.html scripts/published_urls.txt
          git diff --staged --quiet || git commit -m "📰 Conteúdo automático $(date '+%d/%m/%Y')"
          git push
